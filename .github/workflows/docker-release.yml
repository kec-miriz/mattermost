name: Build and Push Docker Image

on:
  push:
    tags:
      - "*.*.*-*"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Validate tag and extract version
        id: version
        run: |
          REF="${GITHUB_REF}"
          if [[ "$REF" != refs/tags/* ]]; then
            echo "::error::This workflow must be triggered by a tag (ref=$REF)"
            exit 1
          fi

          TAG_NAME="${REF#refs/tags/}"
          echo "::notice::Tag detected: $TAG_NAME"
          echo "image_version=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./server/build/Dockerfile
          context: ./server/build
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-server:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-server:${{ steps.version.outputs.image_version }}

      - name: Build and push webapp Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./webapp/Dockerfile
          context: ./webapp
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-websocket:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-websocket:${{ steps.version.outputs.image_version }}
