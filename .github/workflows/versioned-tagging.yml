name: Versioned Tagging

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release-channel:
        description: "Select the release channel to tag the image: 'alpha' for early development, 'beta' for testing."
        default: "beta"
        type: choice
        options:
          - alpha
          - beta

env:
  main_version: "1.0.0"

jobs:
  tagging:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate version
        id: generate_version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${{ env.main_version }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            echo "version=${{ env.main_version }}-${{ inputs.release-channel }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Release version tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME=${{ steps.generate_version.outputs.version }}
          git tag -a $TAG_NAME -m "Release ${{ steps.generate_version.outputs.version }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git $TAG_NAME
        shell: bash
